<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grammar Room - Mobile Optimized</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background-image: url('soba.jpg'); 
            background-size: cover; 
            background-position: center; 
            transition: filter 0.8s ease; 
        }
        .past-mood { filter: sepia(0.5) brightness(0.8); }
        .future-mood { filter: hue-rotate(160deg) brightness(1.1); }
        
        /* Kontrole na vrhu */
        .top-bar { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 100; }
        .timeline { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .time-btn { padding: 8px 14px; border: none; background: transparent; color: white; border-radius: 12px; font-size: 10px; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* PANEL - PODIGNUT ZA MOBILNI */
        .display-wall { 
            position: absolute; 
            bottom: calc(20px + env(safe-area-inset-bottom)); /* Sigurna zona za iPhone/Android */
            left: 50%; 
            transform: translateX(-50%); 
            width: 94%; 
            max-width: 450px; 
            padding: 15px 20px; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(25px); 
            border-radius: 25px; 
            text-align: center; 
            border: 1px solid rgba(0,242,255,0.2); 
            transition: all 0.5s ease; 
            z-index: 150;
        }
        .success-glow { border-color: var(--success) !important; box-shadow: 0 0 30px rgba(0,255,136,0.3); }
