<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grammar Room - Engine & Tutorial</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* TUTORIAL OVERLAY */
        #tutorial-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s ease;
        }
        .tutorial-card {
            width: 85%;
            max-width: 400px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            text-align: center;
        }
        .tutorial-card h2 { color: var(--accent); margin-top: 0; font-size: 24px; }
        .tutorial-card p { font-size: 16px; line-height: 1.6; opacity: 0.8; margin: 20px 0; }
        .tut-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,242,255,0.2);
        }

        /* Glavna soba */
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background-image: url('soba.jpg'); 
            background-size: cover; 
            background-position: center; 
            transition: filter 0.8s ease; 
        }
        
        /* Gornje sekcije */
        .mode-bar { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .timeline-bar { position: absolute; top: 65px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .timeline { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .time-btn { padding: 8px 14px; border: none; background: transparent; color: white; border-radius: 12px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Grammar Room Panel */
        .display-wall { 
            position: absolute; 
            bottom: calc(120px + env(safe-area-inset-bottom)); 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 420px; 
            padding: 20px; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(25px); 
            border-radius: 25px; 
            text-align: center; 
            border: 1px solid rgba(0,242,255,0.2); 
            z-index: 150;
        }
        .instruction { font-size: 9px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.8; }
        .sentence { font-size: 22px; font-weight: bold; }
        .translation-text { color: var(--success); font-size: 16px; margin-top: 8px; font-weight: 500; }

        /* Hotspotovi */
        .hotspot { position: absolute; width: 80px; height: 80px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 0.4; } }
        
        #spot-p { top: 25%; left: 15%; } 
        #spot-v { top: 20%; left: 48%; } 
        #spot-n { top: 35%; left: 75%; }

        .hidden { display: none !important; opacity: 0; }
        .slogan { position: absolute; bottom: -22px; right: 15px; font-size: 9px; color: white; opacity: 0.3; }
    </style>
</head>
<body>

    <div id="tutorial-overlay">
        <div id="step-1" class="tutorial-card">
            <h2>Dobrodošli</h2>
            <p>Ovo nije obična aplikacija. Ovo je vaša <b>Gramatička Soba</b>. Svaki predmet u sobi predstavlja deo rečenice.</p>
            <button class="tut-btn" onclick="nextStep()">DALJE</button>
        </div>
        <div id="step-2" class="tutorial-card hidden">
            <h2>Pravila Igre</h2>
            <p>Klikom na nameštaj menjate osobu, radnju i mesto. Gledajte kako se rečenica gradi na dnu ekrana.</p>
            <button class="tut-btn" onclick="finishTutorial()">ZAPOČNI</button>
        </div>
    </div>

    <div class="mode-bar">
        <button class="mode-toggle" style="padding:8px 20px; background:var(--danger); border:none; border-radius:20px; color:white; font-size:10px; font-weight:bold;">ISPIT: ISKLJUČEN</button>
    </div>

    <div class="timeline-bar">
        <div class="timeline">
            <button class="time-btn" onclick="setTime('past')">PROŠLOST</button>
            <button class="time-btn active" onclick="setTime('present')">SADAŠNJOST</button>
            <button class="time-btn" onclick="setTime('future')">BUDUĆNOST</button>
        </div>
    </div>

    <div class="app-container" id="room">
        <div id="panel" class="display-wall">
            <div class="slogan">samo prirodno</div>
            <div class="instruction">ISTRAŽIVANJE</div>
            <div id="en" class="sentence">I go home</div>
            <div id="sr" class="translation-text">Ja idem kući</div>
        </div>
        
        <div id="spot-p" class="hotspot"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot"><div class="hotspot-circle"></div></div>
    </div>

    <script>
        // Logika za tutorijal
        function nextStep() {
            document.getElementById('step-1').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').classList.remove('hidden');
            }, 300);
        }

        function finishTutorial() {
            document.getElementById('tutorial-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('tutorial-overlay').style.display = 'none';
            }, 500);
        }

        // Ovde ide tvoja manuelna tabela i render logika iz prethodnog koda...
    </script>
</body>
</html>
