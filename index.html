<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Room - Precision Dock</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background-image: url('soba.jpg'); 
            background-size: cover; 
            background-position: center; 
            transition: filter 0.8s ease; 
        }
        .past-mood { filter: sepia(0.5) brightness(0.8); }
        .future-mood { filter: hue-rotate(160deg) brightness(1.1); }
        
        /* Gornji bar sa kontrolama */
        .top-bar { position: absolute; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 100; }
        .timeline { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .time-btn { padding: 6px 14px; border: none; background: transparent; color: white; border-radius: 12px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* PANEL SKROZ NA DNU */
        .display-wall { 
            position: absolute; 
            bottom: -5px; /* Skroz na dno, blago prelazi donji deo */
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; /* Širi panel za cinematic izgled */
            max-width: 500px; 
            padding: 25px 20px 35px 20px; /* Veći padding dole da izgleda kao postolje */
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(30px); 
            border-radius: 40px 40px 0 0; /* Zaobljeno samo gore */
            text-align: center; 
            border: 1px solid rgba(0,242,255,0.25); 
            border-bottom: none;
            transition: all 0.5s ease; 
            z-index: 150;
        }
        .success-glow { border-color: var(--success) !important; box-shadow: 0 -15px 50px rgba(0,255,136,0.4); }
        
        .mode-toggle { margin-bottom: 8px; padding: 5px 15px; background: var(--danger); border: none; border-radius: 15px; color: white; font-size: 9px; font-weight: bold; cursor: pointer; }
        .mode-toggle.exam-on { background: var(--success); color: #000; }

        .instruction { font-size: 9px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .sentence { font-size: 24px; font-weight: bold; transition: filter 0.6s ease; }
        .blurred { filter: blur(16px); opacity: 0.05; }
        .translation-text { color: var(--success); font-size: 16px; margin-top: 8px; font-weight: 500; min-height: 20px; }

        /* Hotspotovi */
        .hotspot { position: absolute; width: 85px; height: 85px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px rgba(255,255,255,0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 0.4; } }
        
        #spot-p { top: 40%; left: 10%; } 
        #spot-v { top: 35%; left: 45%; } 
        #spot-n { top: 50%; left: 75%; }

        .slogan { position: absolute; top: -20px; right: 20px; font-size: 9px; color: white; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="timeline">
            <button class="time-btn" id="btn-past" onclick="setTime('past')">PROŠLOST</button>
            <button class="time-btn active" id="btn-present" onclick="setTime('present')">SADAŠNJOST</button>
            <button class="time-btn" id="btn-future" onclick="setTime('future')">BUDUĆNOST</button>
        </div>
    </div>

    <div class="app-container" id="room">
        <div id="panel" class="display-wall">
            <div class="slogan">samo prirodno</div>
            <button class="mode-toggle" id="exam-toggle" onclick="toggleExam()">ISPIT: ISKLJUČEN</button>
            <div id="m-text" class="instruction">ISTRAŽIVANJE</div>
            <div id="en" class="sentence">...</div>
            <div id="sr" class="translation-text">...</div>
        </div>
        
        <div id="spot-p" class="hotspot" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" onclick="tap('n')"><div class="hotspot-circle"></div></div>
    </div>
