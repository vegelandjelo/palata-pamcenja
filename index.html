<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Room - Pro Edition</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Pozadina sa tranzicijom filtera */
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background-image: url('soba.jpg'); 
            background-size: cover; 
            background-position: center; 
            transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .past-mood { filter: sepia(0.6) brightness(0.9) contrast(1.1); }
        .future-mood { filter: hue-rotate(160deg) brightness(1.1) saturate(1.2); }
        
        /* Interfejs na vrhu */
        .top-bar { position: absolute; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        .score-board { color: var(--success); font-weight: bold; font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 10px var(--success); }
        .timeline { display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .time-btn { padding: 8px 16px; border: none; background: transparent; color: white; border-radius: 15px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        .mode-toggle { padding: 10px 25px; background: var(--danger); border: none; border-radius: 25px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; transition: 0.4s; box-shadow: 0 4px 15px rgba(255,0,0,0.2); }
        .mode-toggle.exam-on { background: var(--success); color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }

        /* Glavni Panel sa Smooth Unblur */
        .display-wall { 
            position: absolute; 
            top: 150px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 340px; 
            padding: 20px; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            text-align: center; 
            border: 1px solid rgba(0,242,255,0.2); 
            transition: all 0.5s ease; 
        }
        .success-glow { border-color: var(--success) !important; box-shadow: 0 0 40px var(--success); transform: translateX(-50%) scale(1.05); }
        
        .instruction { font-size: 10px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.7; }
        .sentence { font-size: 24px; font-weight: bold; transition: filter 0.6s ease, opacity 0.6s ease; }
        .blurred { filter: blur(15px); opacity: 0.1; }
        .translation-text { color: var(--success); font-size: 15px; margin-top: 10px; font-style: italic; min-height: 20px; }

        /* Hotspotovi */
        .hotspot { position: absolute; width: 90px; height: 90px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { width: 35px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px rgba(255,255,255,0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }
        
        #spot-p { top: 50%; left: 10%; } 
        #spot-v { top: 40%; left: 45%; } 
        #spot-n { top: 60%; left: 75%; }

        .hidden { display: none !important; }
        .slogan { position: absolute; bottom: 10px; right: 10px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="score" class="score-board hidden">BODOVI: 0</div>
        <div class="timeline">
            <button class="time-btn" id="btn-past" onclick="setTime('past')">PROŠLOST</button>
            <button class="time-btn active" id="btn-present" onclick="setTime('present')">SADAŠNJOST</button>
            <button class="time-btn" id="btn-future" onclick="setTime('future')">BUDUĆNOST</button>
        </div>
        <button class="mode-toggle" id="exam-toggle" onclick="toggleExam()">ISPIT: ISKLJUČEN</button>
    </div>

    <div class="app-container" id="room">
        <div id="panel" class="display-wall">
            <div id="m-text" class="instruction">ISTRAŽIVANJE</div>
            <div id="en" class="sentence">...</div>
            <div id="sr" class="translation-text">...</div>
        </div>
        
        <div id="spot-p" class="hotspot" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" onclick="tap('n')"><div class="hotspot-circle"></div></div>

        <div class="slogan">samo prirodno</div>
    </div>

    <script>
        const db = {
            p: [{e:"I", s:"Ja"}, {e:"You", s:"Ti"}, {e:"He", s:"On"}, {e:"She", s:"Ona"}, {e:"They", s:"Oni"}],
            v: [
                {pres:"go", past:"went", fut:"will go", srb:"ide"},
                {pres:"make", past:"made", fut:"will make", srb:"pravi"},
                {pres:"want", past:"wanted", fut:"will want", srb:"želi"}
            ],
            n: [{e:"home", s:"kući"}, {e:"history", s:"istoriju"}, {e:"coffee", s:"kafu"}]
        };

        const goals = [
            { t: "On je išao kući", r: { p:2, v:0, n:0, time:'past' } },
            { t: "Ja pravim kafu", r: { p:0, v:2, n:2, time:'present' } },
            { t: "Oni će praviti istoriju", r: { p:4, v:1, n:1, time:'future' } }
        ];

        let state = { p:0, v:0, n:0, time:'present' }, curGoal = 0, score = 0, isExam = false, lock = false;

        function toggleExam() {
            isExam = !isExam;
            document.getElementById('exam-toggle').innerText = isExam ? "ISPIT: UKLJUČEN" : "ISPIT: ISKLJUČEN";
            document.getElementById('exam-toggle').classList.toggle('exam-on');
            document.getElementById('score').classList.toggle('hidden');
            render();
        }

        function setTime(t) {
            if(lock) return;
            state.time = t;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
            document.getElementById('room').className = 'app-container ' + (t === 'past' ? 'past-mood' : t === 'future' ? 'future-mood' : '');
            render();
        }

        function tap(k) { if(!lock) { state[k] = (state[k] + 1) % (k === 'p' ? 5 : 3); render(); } }

        function render() {
            let p = db.p[state.p], v = db.v[state.v], n = db.n[state.n];
            let enS = "";

            if (state.time === 'present') {
                let vE = v.pres;
                if (p.e === "He" || p.e === "She") vE = (vE === "go") ? "goes" : vE + "s";
                enS = `${p.e} ${vE} ${n.e}`;
            } else if (state.time === 'past') {
                enS = `${p.e} ${v.past} ${n.e}`;
            } else {
                enS = `${p.e} ${v.fut} ${n.e}`;
            }

            const enDisplay = document.getElementById('en');
            const srDisplay = document.getElementById('sr');
            enDisplay.innerText = enS;
            document.getElementById('m-text').innerText = isExam ? `ZADATAK: ${goals[curGoal].t}` : "ISTRAŽIVANJE";

            if (isExam) {
                enDisplay.classList.add('blurred');
                srDisplay.innerText = "???";
                checkSuccess();
            } else {
                enDisplay.classList.remove('blurred');
                srDisplay.innerText = "Slušaj i uči";
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(enS); u.lang='en-US'; window.speechSynthesis.speak(u);
            }
        }

        function checkSuccess() {
            let g = goals[curGoal].r;
            if (state.p === g.p && state.v === g.v && state.n === g.n && state.time === g.time) {
                lock = true;
                score += 10;
                document.getElementById('score').innerText = `BODOVI: ${score}`;
                document.getElementById('panel').classList.add('success-glow');
                document.getElementById('en').classList.remove('blurred');
                document.getElementById('sr').innerText = "TAČNO!";

                setTimeout(() => {
                    lock = false;
                    curGoal = (curGoal + 1) % goals.length;
                    document.getElementById('panel').classList.remove('success-glow');
                    render();
                }, 2500);
            }
        }
        render();
    </script>
</body>
</html>
