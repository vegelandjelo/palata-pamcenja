<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Room</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff0000; }
        * { -webkit-tap-highlight-color: transparent; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        .app-container { position: relative; width: 100%; height: 100vh; background-image: url('soba.jpg'); background-size: cover; background-position: center; }
        
        .display-wall { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 300px; padding: 15px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-radius: 20px; text-align: center; z-index: 10; border: 1px solid var(--accent); }
        .success-glow { border: 3px solid var(--success) !important; box-shadow: 0 0 30px var(--success); }
        
        .instruction { font-size: 10px; color: var(--accent); letter-spacing: 2px; }
        .sentence { font-size: 22px; font-weight: bold; color: #fff; margin: 5px 0; }
        .live-translation { font-size: 15px; color: var(--success); }

        .hotspot { position: absolute; width: 90px; height: 90px; z-index: 5; display: flex; align-items: center; justify-content: center; }
        .hotspot-circle { width: 45px; height: 45px; background: var(--danger); border-radius: 50%; opacity: 0.6; border: 2px solid #fff; }
        
        #spot-p { top: 45%; left: 10%; }
        #spot-v { top: 35%; left: 45%; }
        #spot-n { top: 55%; left: 68%; }

        .overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; text-align: center; }
        .start-btn { margin-top: 30px; padding: 20px 50px; background: var(--accent); border: none; border-radius: 50px; font-weight: bold; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="step-1" class="overlay">
        <h1>GRAMMAR ROOM</h1>
        <p>🪞 Ogledalo | 🚪 Vrata | 🪴 Sto</p>
        <button class="start-btn" onclick="next()">POČNI</button>
    </div>

    <div class="app-container">
        <div id="panel" class="display-wall">
            <div id="m-text" class="instruction">ZADATAK</div>
            <div id="en" class="sentence">Loding...</div>
            <div id="sr" class="live-translation">...</div>
        </div>
        
        <div id="spot-p" class="hotspot" ontouchend="tap('p')" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" ontouchend="tap('v')" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" ontouchend="tap('n')" onclick="tap('n')"><div class="hotspot-circle"></div></div>
    </div>

    <script>
        const db = {
            p: [{e:"I", s:"Ja"}, {e:"You", s:"Ti"}, {e:"He", s:"On"}, {e:"She", s:"Ona"}, {e:"They", s:"Oni"}],
            v: [{e:"go", b:"ide"}, {e:"make", b:"pravi"}, {e:"want", b:"želi"}, {e:"need", b:"treba"}, {e:"see", b:"vidi"}],
            n: [{e:"home", s:"kući"}, {e:"history", s:"istoriju"}, {e:"a choice", s:"izbor"}, {e:"coffee", s:"kafu"}, {e:"the world", s:"svet"}]
        };
        const goals = [
            {t:"Ja idem kući", r:[0,0,0]}, {t:"Ti praviš istoriju", r:[1,1,1]},
            {t:"On želi kafu", r:[2,2,3]}, {t:"Oni vide izbor", r:[4,4,2]}, {t:"Ona treba svet", r:[3,3,4]}
        ];

        let state = {p:0, v:0, n:0}, cur = 0, lock = false, audio;

        function next() {
            audio = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('step-1').classList.add('hidden');
            render(true);
        }

        function tap(k) {
            if(lock) return;
            // Odmah menjamo stanje bez odlaganja
            state[k] = (state[k] + 1) % 5;
            render(false);
        }

        function render(mute) {
            let p = db.p[state.p], v = db.v[state.v], n = db.n[state.n];
            let vE = v.e, vS = v.b;

            // Logička ispravka samo za prikaz
            if(n.e === "home") { vE = "go"; vS = "ide"; }
            if(p.e === "I") vS += "m"; 
            else if(p.e === "You") vS += "š"; 
            else if(p.e === "They") vS = (vS==="ide"?"idu":vS+"u");
            if(p.e === "He" || p.e === "She") vE = (vE==="go"?"goes":vE+"s");

            document.getElementById('en').innerText = `${p.e} ${vE} ${n.e}`;
            document.getElementById('sr').innerText = `${p.s} ${vS} ${n.s}`;
            document.getElementById('m-text').innerText = `ZADATAK: ${goals[cur].t}`;

            if(!mute) {
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(`${p.e} ${vE} ${n.e}`); 
                u.lang='en-US'; u.rate = 0.9;
                window.speechSynthesis.speak(u);
            }

            // Provera pobede
            if(state.p==goals[cur].r[0] && state.v==goals[cur].r[1] && state.n==goals[cur].r[2]) {
                lock = true;
                document.getElementById('panel').classList.add('success-glow');
                
                // Zvuk
                if(audio) {
                    let o=audio.createOscillator(), g=audio.createGain();
                    o.connect(g); g.connect(audio.destination);
                    o.frequency.setValueAtTime(800, audio.currentTime);
                    g.gain.setValueAtTime(0.1, audio.currentTime);
                    o.start(); o.stop(audio.currentTime+0.2);
                }

                setTimeout(() => {
                    lock = false;
                    cur = (cur + 1) % 5;
                    state = {p:0, v:0, n:0};
                    document.getElementById('panel').classList.remove('success-glow');
                    render(true);
                }, 1500);
            }
        }
    </script>
</body>
</html>
