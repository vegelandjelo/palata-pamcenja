<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grammar Room - Master Engine</title>
    <style>
        /* --- CSS KOJI JE ZAPEČAĆEN --- */
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* POZADINA */
        .app-container { position: relative; width: 100%; height: 100vh; background: url('soba.jpg') center/cover; transition: filter 0.8s ease; }
        .tutorial-active .app-container { filter: brightness(0.3) blur(8px); }
        .past-mood { filter: sepia(0.4) brightness(0.8); }
        .future-mood { filter: hue-rotate(160deg) brightness(1.1); }

        /* TUTORIJAL OVERLAY */
        #master-tutorial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); transition: 0.5s;
        }
        .bubble { background: rgba(0,0,0,0.9); border: 2px solid var(--accent); padding: 30px; border-radius: 30px; max-width: 400px; text-align: center; margin-bottom: 20px; box-shadow: 0 0 30px rgba(0,242,255,0.3); }
        .tut-btn { background: var(--accent); color: #000; border: none; padding: 15px 45px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* HOTSPOTOVI & POINTER */
        .hotspot { position: absolute; width: 75px; height: 75px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { width: 34px; height: 34px; border: 2px solid var(--danger); border-radius: 50%; background: rgba(255,68,68,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px rgba(255,68,68,0.4); } 50% { transform: scale(1.15); box-shadow: 0 0 25px rgba(255,68,68,0.7); } 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,68,68,0.4); } }
        
        #spot-p { top: 55%; left: 8%; } 
        #spot-v { top: 38%; left: 48%; } 
        #spot-n { top: 58%; left: 80%; }

        /* UI ELEMENTI */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .ui-layer * { pointer-events: auto; }
        .timeline { display: flex; gap: 6px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 18px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); margin-top: 70px; }
        .time-btn { padding: 8px 15px; border: none; background: transparent; color: white; border-radius: 14px; font-size: 10px; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        
        .display-wall { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; padding: 22px; background: rgba(0,0,0,0.85); border-radius: 30px; text-align: center; border: 1px solid var(--accent); }
        .slogan { position: absolute; bottom: -25px; right: 15px; font-size: 9px; opacity: 0.4; font-style: italic; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="tutorial-active">

    <div id="master-tutorial">
        <div class="bubble">
            <h1 id="tut-title">🏛️ Metod Loci</h1>
            <p id="tut-text">Tvoj mozak pamti lokacije bolje nego reči. Pretvorili smo ovu sobu u tvoju memorijsku palatu.</p>
        </div>
        <button class="tut-btn" onclick="runTutorial()">DALJE</button>
    </div>

    <div class="app-container" id="room">
        <div class="ui-layer">
            <div style="display:flex; justify-content:center; padding-top:25px;">
                <button id="exam-toggle" onclick="toggleExam()" style="padding: 8px 20px; background: var(--danger); border: none; border-radius: 20px; color: white; font-size: 10px; font-weight: bold;">ISPIT: ISKLJUČEN</button>
            </div>
            <div style="display:flex; justify-content:center;">
                <div class="timeline">
                    <button class="time-btn" id="btn-past" onclick="setTime('past')">PROŠLOST</button>
                    <button class="time-btn active" id="btn-present" onclick="setTime('present')">SADAŠNJOST</button>
                    <button class="time-btn" id="btn-future" onclick="setTime('future')">BUDUĆNOST</button>
                </div>
            </div>
        </div>

        <div id="spot-p" class="hotspot" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" onclick="tap('n')"><div class="hotspot-circle"></div></div>

        <div class="display-wall">
            <div class="slogan">samo prirodno</div>
            <div id="m-text" style="font-size: 9px; color: var(--accent); letter-spacing: 2px; margin-bottom:10px;">ISTRAŽIVANJE</div>
            <div id="en" style="font-size: 24px; font-weight: bold; min-height: 32px;">...</div>
            <div id="sr" style="color: var(--success); font-size: 16px; margin-top: 10px; font-weight: 500;">...</div>
        </div>
    </div>

    <script>
        // --- DATA BAZA (Tvoj Pareto 500) ---
        const totalBaza = {
            "p0_v0_n0_present": "Ja idem kući",
            "p3_v2_n0_future": "Ona će želeti kuću",
            // Dodaj ovde ostalih 75+ rečenica...
        };

        let state = { p:0, v:0, n:0, time:'present' };
        let isExam = false;
        let tutStep = 0;

        // --- LOGIKA TUTORIJALA ---
        function runTutorial() {
            const steps = [
                { t: "🪞 Ogledalo = OSOBA", p: "Ovde menjaš ko vrši radnju (Ja, Ti, On...).", spot: "spot-p" },
                { t: "🚪 Vrata = AKCIJA", p: "Vrata su tvoji glagoli. Svaki prolaz je nova radnja.", spot: "spot-v" },
                { t: "💻 Radni sto = PREDMET", p: "Ono što se koristi u rečenici stoji na stolu.", spot: "spot-n" },
                { t: "🚀 Spreman si!", p: "Klikni na predmete i spajaj gramatiku prirodno.", spot: null }
            ];

            if (tutStep < steps.length) {
                const s = steps[tutStep];
                document.getElementById('tut-title').innerText = s.t;
                document.getElementById('tut-text').innerText = s.p;
                
                // Fokusiranje na određeni hotspot
                document.querySelectorAll('.hotspot').forEach(h => h.style.zIndex = "10");
                if(s.spot) document.getElementById(s.spot).style.zIndex = "3000";

                tutStep++;
            } else {
                document.body.classList.remove('tutorial-active');
                document.getElementById('master-tutorial').classList.add('hidden');
                document.querySelectorAll('.hotspot').forEach(h => h.style.zIndex = "20");
                render();
            }
        }

        // --- CORE ENGINE ---
        function setTime(t) {
            state.time = t;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
            document.getElementById('room').className = 'app-container ' + (t === 'past' ? 'past-mood' : t === 'future' ? 'future-mood' : '');
            render();
        }

        function tap(k) { state[k] = (state[k] + 1) % (k === 'p' ? 5 : 3); render(); }

        function toggleExam() {
            isExam = !isExam;
            document.getElementById('exam-toggle').innerText = isExam ? "ISPIT: UKLJUČEN" : "ISPIT: ISKLJUČEN";
            document.getElementById('exam-toggle').style.background = isExam ? "var(--success)" : "var(--danger)";
            render();
        }

        function render() {
            let key = `p${state.p}_v${state.v}_n${state.n}_${state.time}`;
            let srS = totalBaza[key] || "Kod: " + key;
            let enS = generateEnglish(state.p, state.v, state.n, state.time);

            document.getElementById('en').innerText = enS;
            document.getElementById('en').style.filter = isExam ? "blur(15px)" : "none";
            document.getElementById('sr').innerText = isExam ? "???" : srS;
            document.getElementById('m-text').innerText = isExam ? "ZADATAK: " + srS : "ISTRAŽIVANJE";

            if (!isExam) {
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(enS); u.lang='en-US'; window.speechSynthesis.speak(u);
            }
        }

        function generateEnglish(p, v, n, t) {
            const en_p = ["I", "You", "He", "She", "They"];
            const en_v = [{p:"go", past:"went"}, {p:"make", past:"made"}, {p:"want", past:"wanted"}];
            const en_n = ["home", "history", "coffee"];
            if(t === 'present') {
                let verb = en_v[v].p;
                if(p === 2 || p === 3) verb = (verb === "go") ? "goes" : verb + "s";
                return `${en_p[p]} ${verb} ${en_n[n]}`;
            } else if(t === 'past') return `${en_p[p]} ${en_v[v].past} ${en_n[n]}`;
            else return `${en_p[p]} will ${en_v[v].p} ${en_n[n]}`;
        }
    </script>
</body>
</html>
