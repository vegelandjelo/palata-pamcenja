<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grammar Room - Master Edition</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        .app-container { position: relative; width: 100%; height: 100vh; background: url('soba.jpg') center/cover; transition: filter 0.8s ease; }
        .tutorial-active .app-container { filter: brightness(0.1) blur(15px); }

        /* TUTORIJAL MODAL */
        #master-tutorial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }
        .bubble { 
            background: rgba(0,0,0,0.95); border: 2px solid var(--accent); 
            padding: 30px; border-radius: 35px; width: 92%; max-width: 550px; 
            max-height: 70vh; overflow-y: auto; margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(0,242,255,0.15); 
        }
        /* Custom scrollbar za dugačak tekst */
        .bubble::-webkit-scrollbar { width: 5px; }
        .bubble::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .tut-btn { background: var(--accent); color: #000; border: none; padding: 18px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }

        .icon-summary { display: flex; justify-content: space-around; margin-top: 25px; border-top: 1px solid rgba(0,242,255,0.2); padding-top: 20px; }
        .icon-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; color: var(--accent); font-weight: bold; }
        .icon-big { font-size: 45px; margin-bottom: 5px; filter: drop-shadow(0 0 10px var(--accent)); }

        /* HOTSPOTOVI & UI */
        .hotspot { position: absolute; width: 80px; height: 80px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { width: 34px; height: 34px; border: 2px solid var(--danger); border-radius: 50%; background: rgba(255,68,68,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }
        #spot-p { top: 55%; left: 8%; } #spot-v { top: 38%; left: 48%; } #spot-n { top: 58%; left: 80%; }

        .display-wall { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; padding: 22px; background: rgba(0,0,0,0.85); border-radius: 30px; text-align: center; border: 1px solid var(--accent); }
        .hidden { display: none !important; }
        b { color: var(--accent); }
    </style>
</head>
<body class="tutorial-active">

    <div id="master-tutorial">
        <div class="bubble" id="tut-bubble">
            <h1 id="tut-title" style="font-size: 20px; margin-bottom: 15px; color: var(--accent);">Dobrodošli</h1>
            <div id="tut-content">
                <p id="tut-text" style="line-height: 1.7; font-size: 16px; text-align: left;">
                    Ispred vas se nalazi jedna vrlo neuobičajena i zanimljiva aplikacija.
                </p>
            </div>
            <div id="tut-icons" class="hidden">
                <div class="icon-summary">
                    <div class="icon-item"><span class="icon-big">🪞</span><span>OSOBA</span></div>
                    <div class="icon-item"><span class="icon-big">🚪</span><span>AKCIJA</span></div>
                    <div class="icon-item"><span class="icon-big">💻</span><span>PREDMET</span></div>
                </div>
            </div>
        </div>
        <button class="tut-btn" id="tut-btn" onclick="runTutorial()">DALJE</button>
    </div>

    <div class="app-container" id="room">
        <div id="spot-p" class="hotspot" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" onclick="tap('n')"><div class="hotspot-circle"></div></div>
        <div class="display-wall">
            <div id="m-text" style="font-size: 9px; color: var(--accent); letter-spacing: 2px; margin-bottom:10px; text-transform:uppercase;">ISTRAŽIVANJE</div>
            <div id="en" style="font-size: 24px; font-weight: bold; min-height: 32px;">...</div>
            <div id="sr" style="color: var(--success); font-size: 16px; margin-top: 10px; font-weight: 500;">...</div>
        </div>
    </div>

    <script>
        const totalBaza = {
            "p0_v0_n0_present": "Ja idem kući", "p0_v0_n1_present": "Ja idem u istoriju", "p0_v0_n2_present": "Ja idem na kafu",
            "p1_v0_n0_present": "Ti ideš kući", "p2_v0_n0_present": "On ide kući", "p3_v0_n0_present": "Ona ide kući", "p4_v0_n0_present": "Oni idu kući",
            "p0_v1_n2_present": "Ja pravim kafu", "p3_v1_n0_present": "Ona pravi kuću", "p0_v2_n0_present": "Ja želim kuću", "p3_v2_n0_present": "Ona želi kuću",
            "p0_v0_n0_past": "Ja sam išao kući", "p1_v0_n0_past": "Ti si išao kući", "p2_v0_n0_past": "On je išao kući",
            "p0_v0_n0_future": "Ja ću ići kući", "p1_v0_n0_future": "Ti ćeš ići kući", "p2_v0_n0_future": "On će ići kući"
        };

        let state = { p:0, v:0, n:0, time:'present' };
        let tutStep = 0;

        function runTutorial() {
            const content = document.getElementById('tut-content');
            const title = document.getElementById('tut-title');
            
            if (tutStep === 0) {
                title.innerText = "Filozofija učenja";
                content.innerHTML = `
                    <p style="line-height: 1.8; font-size: 16px; text-align: left;">
                        Ovaj sistem nije napravljen za klasično "bubanje", već za promenu načina na koji vaš mozak procesira jezik. <br><br>
                        <b>Loci Metod:</b> Antički govornici su pamtili sate govora tako što su reči "stavljali" u prostor. Mi smo gramatiku stavili u ovu sobu. Vaš mozak nije kanta za reči, on je GPS. Kada povežete reč sa lokacijom, ona postaje trajno sećanje.<br><br>
                        <b>Pareto Zakon:</b> 80% komunikacije obavljamo sa 20% reči. Fokusirani smo isključivo na te ključne glagole. Ovde ne gubite vreme na reči koje nikada nećete upotrebiti.<br><br>
                        <b>Happy Accident:</b> Učenje se dešava spontano. Kliktanjem po prostoru i "slučajnim" spajanjem rečenica, vi simulirate prirodno učenje deteta. Bez pritiska, bez gramatičkih tablica, samo čista intuicija i prostor.<br><br>
                        Ovaj prostor je vaša <b>Memorijska Palata</b>. Svaki predmet koji vidite je sidro za englesku rečenicu koja će ostati u vašoj podsvesti.
                    </p>`;
                tutStep++;
            } else if (tutStep === 1) {
                title.innerText = "Mapa Uma";
                content.innerHTML = `<p style="line-height: 1.6; font-size: 16px;">Pre nego što zakoračite, zapamtite tri ključna sidra u prostoru:</p>`;
                document.getElementById('tut-icons').classList.remove('hidden');
                tutStep++;
            } else {
                document.body.classList.remove('tutorial-active');
                document.getElementById('master-tutorial').classList.add('hidden');
                render();
            }
        }

        // --- Render i ostale funkcije su iste kao ranije ---
        function tap(k) { state[k] = (state[k] + 1) % (k === 'p' ? 5 : 3); render(); }
        function render() {
            let key = `p${state.p}_v${state.v}_n${state.n}_${state.time}`;
            let srS = totalBaza[key] || "Prevod uskoro...";
            let enS = generateEnglish(state.p, state.v, state.n, state.time);
            document.getElementById('en').innerText = enS;
            document.getElementById('sr').innerText = srS;
            if (!document.body.classList.contains('tutorial-active')) {
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(enS); u.lang='en-US'; window.speechSynthesis.speak(u);
            }
        }
        function generateEnglish(p, v, n, t) {
            const en_p = ["I", "You", "He", "She", "They"];
            const en_v = [{p:"go", past:"went"}, {p:"make", past:"made"}, {p:"want", past:"wanted"}];
            const en_n = ["home", "history", "coffee"];
            if(t === 'present') return `${en_p[p]} ${en_v[v].p} ${en_n[n]}`;
            return `${en_p[p]} ${en_v[v].past} ${en_n[n]}`;
        }
        render();
    </script>
</body>
</html>
