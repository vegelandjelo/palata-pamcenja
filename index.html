<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grammar Room - Trening</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        .app-container { position: relative; width: 100%; height: 100vh; background: url('soba.jpg') center/cover; }
        .hotspot { position: absolute; width: 80px; height: 80px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { width: 34px; height: 34px; border: 2px solid var(--danger); border-radius: 50%; background: rgba(255,68,68,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        #spot-p { top: 55%; left: 8%; } #spot-v { top: 38%; left: 48%; } #spot-n { top: 58%; left: 80%; }
        .display-wall { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 440px; padding: 22px; background: rgba(0,0,0,0.85); border-radius: 30px; text-align: center; border: 1px solid var(--accent); }
        .time-btn { padding: 8px 15px; background: transparent; color: white; border: none; cursor: pointer; font-size: 10px; }
        .time-btn.active { background: var(--accent); color: black; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <div style="position:absolute; top:20px; width:100%; display:flex; flex-direction:column; align-items:center; z-index:100;">
            <button onclick="toggleExam()" id="exam-btn" style="background:var(--danger); color:white; border:none; padding:8px 20px; border-radius:20px; font-weight:bold; margin-bottom:10px;">ISPIT: ISKLJUČEN</button>
            <div style="background:rgba(0,0,0,0.6); padding:5px; border-radius:15px; display:flex;">
                <button class="time-btn" id="btn-past" onclick="setTime('past')">PROŠLOST</button>
                <button class="time-btn active" id="btn-present" onclick="setTime('present')">SADAŠNJOST</button>
                <button class="time-btn" id="btn-future" onclick="setTime('future')">BUDUĆNOST</button>
            </div>
        </div>

        <div id="spot-p" class="hotspot" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" onclick="tap('n')"><div class="hotspot-circle"></div></div>

        <div class="display-wall">
            <div id="m-text" style="font-size: 9px; color: var(--accent); letter-spacing: 2px; margin-bottom:5px;">ISTRAŽIVANJE</div>
            <div id="en" style="font-size: 24px; font-weight: bold;">...</div>
            <div id="sr" style="color: var(--success); font-size: 16px; margin-top: 10px;">...</div>
        </div>
    </div>

    <script>
        const totalBaza = { /* Ovde pejstuj onaj veliki spisak rečenica iz prethodne poruke */ };
        let state = { p:0, v:0, n:0, time:'present' }, isExam = false;

        function setTime(t) {
            state.time = t;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
            render();
        }

        function tap(k) { state[k] = (state[k] + 1) % (k === 'p' ? 5 : 3); render(); }

        function toggleExam() {
            isExam = !isExam;
            document.getElementById('exam-btn').innerText = isExam ? "ISPIT: UKLJUČEN" : "ISPIT: ISKLJUČEN";
            document.getElementById('exam-btn').style.background = isExam ? "var(--success)" : "var(--danger)";
            render();
        }

        function render() {
            let key = `p${state.p}_v${state.v}_n${state.n}_${state.time}`;
            let srS = totalBaza[key] || "Prevod uskoro...";
            let enS = generateEnglish(state.p, state.v, state.n, state.time);
            document.getElementById('en').innerText = enS;
            document.getElementById('en').style.filter = isExam ? "blur(18px)" : "none";
            document.getElementById('sr').innerText = isExam ? "???" : srS;
            document.getElementById('m-text').innerText = isExam ? "ZADATAK: " + srS : "ISTRAŽIVANJE";
            if (!isExam) {
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(enS); u.lang='en-US'; window.speechSynthesis.speak(u);
            }
        }

        function generateEnglish(p, v, n, t) {
            const en_p = ["I", "You", "He", "She", "They"];
            const en_v = [{p:"go", past:"went"}, {p:"make", past:"made"}, {p:"want", past:"wanted"}];
            const en_n = ["home", "history", "coffee"];
            if(t === 'present') {
                let verb = en_v[v].p;
                if(p === 2 || p === 3) verb = (verb === "go") ? "goes" : verb + "s";
                return `${en_p[p]} ${verb} ${en_n[n]}`;
            } else if(t === 'past') return `${en_p[p]} ${en_v[v].past} ${en_n[n]}`;
            else return `${en_p[p]} will ${en_v[v].p} ${en_n[n]}`;
        }
        render();
    </script>
</body>
</html>
