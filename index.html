<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grammar Room - Total Engine</title>
    <style>
        :root { --accent: #00f2ff; --success: #00ff88; --danger: #ff4444; }
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* 1. TUTORIAL OVERLAY */
        #tutorial-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.6s ease;
        }
        .tutorial-card {
            width: 85%;
            max-width: 400px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px;
            text-align: center;
        }
        .tut-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 2. GLAVNI KONTEJNER */
        .app-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            background-image: url('soba.jpg'); 
            background-size: cover; 
            background-position: center; 
        }
        .past-mood { filter: sepia(0.4) brightness(0.8); }
        .future-mood { filter: hue-rotate(160deg) brightness(1.1); }
        
        /* GORNJE SEKCIJE */
        .mode-bar { position: absolute; top: 25px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .mode-toggle { padding: 8px 20px; background: var(--danger); border: none; border-radius: 20px; color: white; font-size: 10px; font-weight: bold; cursor: pointer; }
        .mode-toggle.exam-on { background: var(--success); color: #000; }

        .timeline-bar { position: absolute; top: 70px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .timeline { display: flex; gap: 6px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 18px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .time-btn { padding: 8px 15px; border: none; background: transparent; color: white; border-radius: 14px; font-size: 10px; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* 3. CRVENI HOTSPOTOVI */
        .hotspot { position: absolute; width: 85px; height: 85px; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hotspot-circle { 
            width: 34px; height: 34px; 
            background: rgba(255, 68, 68, 0.2); 
            border-radius: 50%; 
            border: 2px solid var(--danger); 
            animation: pulse-red 2s infinite; 
        }
        @keyframes pulse-red { 
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); } 
            50% { transform: scale(1.15); box-shadow: 0 0 25px rgba(255, 68, 68, 0.7); } 
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); } 
        }
        #spot-p { top: 25%; left: 15%; } 
        #spot-v { top: 20%; left: 48%; } 
        #spot-n { top: 35%; left: 75%; }

        /* 4. GRAMMAR PANEL */
        .display-wall { 
            position: absolute; 
            bottom: calc(120px + env(safe-area-inset-bottom)); 
            left: 50%; 
            transform: translateX(-50%); 
            width: 92%; 
            max-width: 440px; 
            padding: 22px; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(30px); 
            border-radius: 30px; 
            text-align: center; 
            border: 1px solid rgba(0,242,255,0.2); 
            z-index: 150;
        }
        .instruction { font-size: 9px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .sentence { font-size: 24px; font-weight: bold; min-height: 32px; }
        .translation-text { color: var(--success); font-size: 16px; margin-top: 10px; font-weight: 500; }
        .blurred { filter: blur(18px); opacity: 0.05; }
        .slogan { position: absolute; bottom: -25px; right: 15px; font-size: 9px; opacity: 0.4; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="tutorial-overlay">
        <div id="step-1" class="tutorial-card">
            <h2>Dobrodošli</h2>
            <p>Istražite prostor i savladajte gramatiku kroz interakciju sa predmetima.</p>
            <button class="tut-btn" onclick="nextStep()">DALJE</button>
        </div>
        <div id="step-2" class="tutorial-card hidden">
            <h2>Pravila</h2>
            <p>Koristite <b>crvene tačke</b> za promenu rečenice. Timeline menja vreme radnje.</p>
            <button class="tut-btn" onclick="finishTutorial()">ZAPOČNI</button>
        </div>
    </div>

    <div class="mode-bar"><button class="mode-toggle" id="exam-toggle" onclick="toggleExam()">ISPIT: ISKLJUČEN</button></div>
    <div class="timeline-bar">
        <div class="timeline">
            <button class="time-btn" id="btn-past" onclick="setTime('past')">PROŠLOST</button>
            <button class="time-btn active" id="btn-present" onclick="setTime('present')">SADAŠNJOST</button>
            <button class="time-btn" id="btn-future" onclick="setTime('future')">BUDUĆNOST</button>
        </div>
    </div>

    <div class="app-container" id="room">
        <div id="panel" class="display-wall">
            <div class="slogan">samo prirodno</div>
            <div id="m-text" class="instruction">ISTRAŽIVANJE</div>
            <div id="en" class="sentence">...</div>
            <div id="sr" class="translation-text">...</div>
        </div>
        <div id="spot-p" class="hotspot" onclick="tap('p')"><div class="hotspot-circle"></div></div>
        <div id="spot-v" class="hotspot" onclick="tap('v')"><div class="hotspot-circle"></div></div>
        <div id="spot-n" class="hotspot" onclick="tap('n')"><div class="hotspot-circle"></div></div>
    </div>

    <script>
        // TOTAL FLAT MAPA - Ovde upisuješ PUNU srpsku rečenicu za svaku kombinaciju
        // Ključ: p(osoba)_v(glagol)_n(objekat)_t(vreme)
        const totalBaza = {
            // PRIMER ZA ONA (p3) + ŽELETI (v2) + KUĆU (n0) + BUDUĆNOST (future)
            "p3_v2_n0_future": "Ona će želeti kuću",
            "p3_v0_n0_future": "Ona će ići kući",
            
            // Ovde nastavljaš da puniš ostalo...
            "p0_v0_n0_present": "Ja idem kući",
            "p0_v1_n2_present": "Ja pravim kafu",
            // ITD...
        };

        let state = { p:0, v:0, n:0, time:'present' }, isExam = false;

        function nextStep() {
            document.getElementById('step-1').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').classList.remove('hidden');
            }, 300);
        }

        function finishTutorial() {
            document.getElementById('tutorial-overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('tutorial-overlay').style.display = 'none'; }, 600);
        }

        function toggleExam() {
            isExam = !isExam;
            document.getElementById('exam-toggle').innerText = isExam ? "ISPIT: UKLJUČEN" : "ISPIT: ISKLJUČEN";
            document.getElementById('exam-toggle').classList.toggle('exam-on');
            render();
        }

        function setTime(t) {
            state.time = t;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
            document.getElementById('room').className = 'app-container ' + (t === 'past' ? 'past-mood' : t === 'future' ? 'future-mood' : '');
            render();
        }

        function tap(k) { state[k] = (state[k] + 1) % (k === 'p' ? 5 : 3); render(); }

        function render() {
            let key = `p${state.p}_v${state.v}_n${state.n}_${state.time}`;
            let srS = totalBaza[key] || "Rečenica nije upisana";
            
            // Engleski (ostaje logički jer je jednostavan)
            let enS = generateEnglish(state.p, state.v, state.n, state.time);

            document.getElementById('en').innerText = enS;
            document.getElementById('sr').innerText = isExam ? "???" : srS;
            
            if (!isExam) {
                document.getElementById('en').classList.remove('blurred');
                window.speechSynthesis.cancel();
                let u = new SpeechSynthesisUtterance(enS); u.lang='en-US'; window.speechSynthesis.speak(u);
            } else {
                document.getElementById('en').classList.add('blurred');
            }
        }

        function generateEnglish(p, v, n, t) {
            const en_p = ["I", "You", "He", "She", "They"];
            const en_v = [{p:"go", past:"went"}, {p:"make", past:"made"}, {p:"want", past:"wanted"}];
            const en_n = ["home", "history", "coffee"];
            if(t === 'present') {
                let verb = en_v[v].p;
                if(p === 2 || p === 3) verb = (verb === "go") ? "goes" : verb + "s";
                return `${en_p[p]} ${verb} ${en_n[n]}`;
            } else if(t === 'past') return `${en_p[p]} ${en_v[v].past} ${en_n[n]}`;
            else return `${en_p[p]} will ${en_v[v].p} ${en_n[n]}`;
        }
        render();
    </script>
</body>
</html>
